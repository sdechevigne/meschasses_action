name: 🤖 Build & Deploy Android

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Résumé du build (affiché dans l''historique)'
        required: false
        default: ''

concurrency:
  group: android-build
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ========================================
      # 1️⃣ CHECKOUT
      # ========================================
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MOBILE_REPO }}
          token: ${{ secrets.CI_PAT_TOKEN }}
          path: app

      # ========================================
      # 2️⃣ SETUP
      # ========================================
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 💾 Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # ========================================
      # 3️⃣ BUILD WEB
      # ========================================
      - name: 📚 Install dependencies
        run: |
          cd app
          cat > ./env.ts << 'EOF'
          export const ENV = {
            SUPABASE_URL: '',
            SUPABASE_ANON_KEY: '',
            POSTHOG_KEY: '',
          }
          EOF
          npm install --legacy-peer-deps

      - name: 🏗️ Build web
        run: cd app && npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

      - name: 📱 Sync Capacitor
        run: cd app && npx cap sync android

      - name: 🔐 Fix permissions
        run: chmod +x app/android/gradlew

      # ========================================
      # 4️⃣ KEYSTORE
      # ========================================
      - name: 🔑 Setup Keystore
        run: |
          mkdir -p app/android/app
          echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 --decode > app/android/app/keystore
          chmod 600 app/android/app/keystore

      # ========================================
      # 5️⃣ CONFIGURE
      # ========================================
      - name: 🔧 Configure Gradle
        run: |
          cd app/android
          cat > local.properties << EOF
          sdk.dir=${ANDROID_SDK_ROOT}
          ndk.dir=${ANDROID_NDK_ROOT}
          EOF

      - name: 🔥 Setup Firebase
        run: |
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}" | base64 --decode > app/android/app/google-services.json
          jq empty app/android/app/google-services.json || (echo "::error::google-services.json invalide" && exit 1)

      # ========================================
      # 6️⃣ BUILD
      # ========================================
      - name: 🔨 Build Release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          cd app/android
          ./gradlew bundleRelease \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_PASSWORD="$KEY_PASSWORD" \
            --stacktrace --quiet

      # ========================================
      # 7️⃣ PUBLISH
      # ========================================
      - name: 📝 Convert whatsnew to Play Store format
        run: |
          if [ ! -d app/whatsnew ]; then
            echo "⚠️ app/whatsnew/ introuvable, skip"
            exit 0
          fi
          # r0adkll/upload-google-play attend whatsnew-<lang>-<COUNTRY> (fichier)
          # alors que le repo mobile stocke whatsnew/<lang>/default.txt
          declare -A LANG_COUNTRY=( [fr]=FR [en]=US [es]=ES [de]=DE [it]=IT )
          for lang_dir in app/whatsnew/*/; do
            lang=$(basename "$lang_dir")
            country=${LANG_COUNTRY[$lang]:-${lang^^}}
            src="$lang_dir/default.txt"
            if [ -f "$src" ]; then
              dest="app/whatsnew/whatsnew-${lang}-${country}"
              head -c 500 "$src" > "$dest"
              echo "  ✓ $src → $dest"
            fi
          done
          ls -la app/whatsnew/

      - name: 🚀 Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.ANDROID_PACKAGE_NAME }}
          releaseFiles: 'app/android/app/build/outputs/bundle/release/app-release.aab'
          tracks: internal
          inAppUpdatePriority: 5
          status: completed
          changesNotSentForReview: true
          whatsNewDirectory: app/whatsnew

      # ========================================
      # 8️⃣ ARTIFACTS & NOTIFICATIONS
      # ========================================
      - name: ✅ Success
        if: success()
        run: exit 0

      - name: ❌ Failed
        if: failure()
        run: exit 1
