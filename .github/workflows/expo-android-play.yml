name: Expo Android Play

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Note interne"
        required: false
        default: ""
  push:
    tags:
      - "play-v*"

concurrency:
  group: expo-android-play
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    steps:
      # Checkout du monorepo (pnpm/Turborepo) via un PAT dédié.
      # L'app Expo vit dans app/apps/mobile ; la racine workspace est app/.
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MONOREPO_REPO }}
          token: ${{ secrets.CI_PAT_TOKEN }}
          path: app

      # pnpm DOIT être installé avant setup-node pour que cache: pnpm fonctionne.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Install à la RACINE du workspace : installe aussi packages/core.
      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      # Le package com.meschasses est PARTAGÉ avec l'app live ; le versionCode
      # doit dépasser le dernier build Capacitor en prod (2006147 en juin 2025).
      # github.run_number repart à 1 pour ce workflow -> OFFSET 2100000.
      - name: Compute build number
        env:
          OFFSET: "2100000"
        run: |
          BN=$(( ${{ github.run_number }} + OFFSET ))
          echo "BUILD_NUMBER=$BN" >> "$GITHUB_ENV"

      # Cible le app.json de l'app Expo dans le monorepo.
      - name: Inject build number
        run: |
          node -e '
            const fs = require("fs");
            const p = "app/apps/mobile/app.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            const bn = process.env.BUILD_NUMBER;
            j.expo.ios = j.expo.ios || {};
            j.expo.android = j.expo.android || {};
            j.expo.ios.buildNumber = String(bn);
            j.expo.android.versionCode = Number(bn);
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '

      # Le service account Google Play (secret) est écrit dans le fichier attendu
      # par eas.json (submit.production.android.serviceAccountKeyPath, relatif à
      # apps/mobile : ../../play-service-account.json -> app/play-service-account.json).
      # Jamais commité, effacé en fin de job. Le secret passe par une variable d'env
      # (pas d'interpolation inline dans la ligne shell) puis est écrit via node sans
      # le réémettre.
      - name: Write Play service account
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          node -e 'const j=process.env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON||""; JSON.parse(j); require("fs").writeFileSync("app/play-service-account.json", j); ' \
            || { echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON manquant ou JSON invalide"; exit 1; }

      # Le package com.meschasses utilise Play App Signing : Google attend l'.aab
      # signé avec la clé d'upload HISTORIQUE de l'app live (SHA1 EA:F9:...).
      # On RÉUTILISE le keystore de l'ancien workflow Capacitor (android-build.yml),
      # déjà prouvé bon par les builds Play passés : mêmes secrets, aucun nouveau.
      # On le fournit à `eas build --local` via un credentials.json local (jamais
      # commité, effacé en fin de job). Sans ça, EAS signe avec un keystore
      # auto-généré et Play rejette ("wrong key").
      - name: Write Android upload keystore + credentials.json
        env:
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          [ -n "$ANDROID_KEYSTORE_FILE" ] || { echo "::error::ANDROID_KEYSTORE_FILE manquant"; exit 1; }
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] || { echo "::error::ANDROID_KEYSTORE_PASSWORD manquant"; exit 1; }
          [ -n "$ANDROID_KEY_ALIAS" ] || { echo "::error::ANDROID_KEY_ALIAS manquant"; exit 1; }
          # Décode le keystore d'upload (relatif à apps/mobile, comme credentials.json).
          echo "$ANDROID_KEYSTORE_FILE" | base64 -d > app/apps/mobile/release.keystore
          # credentials.json consommé par `eas build --local`. keyPassword -> storePassword si absent.
          node -e '
            const fs = require("fs");
            const c = {
              android: {
                keystore: {
                  keystorePath: "release.keystore",
                  keystorePassword: process.env.ANDROID_KEYSTORE_PASSWORD,
                  keyAlias: process.env.ANDROID_KEY_ALIAS,
                  keyPassword: process.env.ANDROID_KEY_PASSWORD || process.env.ANDROID_KEYSTORE_PASSWORD,
                },
              },
            };
            fs.writeFileSync("app/apps/mobile/credentials.json", JSON.stringify(c, null, 2) + "\n");
          '
          # Force EAS à utiliser credentials.json en --non-interactive (pas de credentials distants).
          node -e '
            const fs = require("fs");
            const p = "app/apps/mobile/eas.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.build = j.build || {};
            j.build.production = j.build.production || {};
            j.build.production.credentialsSource = "local";
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '

      # eas build --local s'exécute dans apps/mobile. Sortie écrite dans app/
      # (../../app-release.aab depuis apps/mobile) pour rester hors de l'app.
      # Variables EXPO_PUBLIC_* mappées sur les secrets existants (réutilisés).
      - name: Build .aab
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
          # Cohérence avec iOS (bundle id partagé avec l'app live) : pas de sync capabilities.
          EXPO_NO_CAPABILITY_SYNC: "1"
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          # Placeholder : activer plus tard quand l'app utilisera PostHog.
          # EXPO_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
        run: |
          cd app/apps/mobile
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output ../../app-release.aab

      # eas submit lit le track (internal) et le serviceAccountKeyPath depuis eas.json.
      - name: Submit to Play (internal)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd app/apps/mobile
          eas submit \
            --platform android \
            --profile production \
            --path ../../app-release.aab \
            --non-interactive

      # Aucun artifact n'est conservé : l'.aab ne va QUE vers Play (internal).
      # On efface le binaire, la clé service account ET le keystore d'upload
      # (+ credentials.json) en fin de job.
      - name: Wipe build outputs and secrets
        if: always()
        run: rm -f app/app-release.aab app/play-service-account.json app/apps/mobile/release.keystore app/apps/mobile/credentials.json
