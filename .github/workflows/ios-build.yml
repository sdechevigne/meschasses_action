name: 🍎 Build & Deploy iOS

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Résumé du build (affiché dans l''historique)'
        required: false
        default: ''

concurrency:
  group: ios-build
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 60
    environment: production

    steps:
      # ========================================
      # 0️⃣ SELECT XCODE (26 préféré, fallback 16)
      # ========================================
      - name: 🛠️ Select Xcode
        run: |
          ls /Applications | grep -i "^Xcode" || true
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::Aucun Xcode 26 ou 16 trouvé sur le runner"
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      # ========================================
      # 1️⃣ CHECKOUT
      # ========================================
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MOBILE_REPO }}
          token: ${{ secrets.CI_PAT_TOKEN }}
          path: app

      - name: 📥 Checkout CI repo (scripts)
        uses: actions/checkout@v4
        with:
          path: ci

      # ========================================
      # 2️⃣ SETUP & BUILD WEB
      # ========================================
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 💾 Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('app/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: 📚 Install & Build
        run: |
          cd app
          cat > ./env.ts << 'EOF'
          export const ENV = {
            SUPABASE_URL: '',
            SUPABASE_ANON_KEY: '',
            POSTHOG_KEY: '',
          }
          EOF
          npm install --legacy-peer-deps
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

      - name: 📱 Sync Capacitor
        run: cd app && npx cap sync ios

      # ========================================
      # 3️⃣ COCOAPODS
      # ========================================
      - name: 💎 Install CocoaPods
        run: |
          gem install xcodeproj cocoapods
          cd app/ios/App
          rm -rf Pods Podfile.lock
          pod install --repo-update

      # ========================================
      # 4️⃣ VERSION
      # ========================================
      - name: 🔢 Configure Version
        run: |
          cd app
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          BUILD_NUMBER=$((${{ github.run_number }} + 88))
          echo "IOS_VERSION=$VERSION" >> $GITHUB_ENV
          echo "IOS_BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      # ========================================
      # 5️⃣ CERTIFICATS
      # ========================================
      - name: 🔐 Import certificates
        env:
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p actions ios.keychain
          security default-keychain -s ios.keychain
          security unlock-keychain -p actions ios.keychain
          security set-keychain-settings -t 3600 -u ios.keychain

          echo "${{ secrets.IOS_CERTIFICATE_P12 }}" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k ios.keychain -T /usr/bin/codesign -P "${P12_PASSWORD:-}"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions ios.keychain
          rm -f /tmp/cert.p12

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > /tmp/profile.mobileprovision
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          rm -f /tmp/profile.plist
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "PROFILE_UUID=${PROFILE_UUID}" >> $GITHUB_ENV
          rm -f /tmp/profile.mobileprovision

      # ========================================
      # 6️⃣ CONFIGURE XCODE
      # ========================================
      - name: 🔧 Configure Xcode
        run: |
          cd app/ios/App
          ruby << 'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          app_target = project.targets.find { |t| t.name == 'App' }

          app_target.build_configurations.each do |config|
            config.build_settings['MARKETING_VERSION'] = ENV['IOS_VERSION']
            config.build_settings['CURRENT_PROJECT_VERSION'] = ENV['IOS_BUILD_NUMBER']
            config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
          end

          file_ref = project.main_group['App'].files.find { |f| f.path == 'GoogleService-Info.plist' }
          if file_ref.nil?
            file_ref = project.main_group['App'].new_file('GoogleService-Info.plist')
          end
          app_target.add_resources([file_ref]) unless app_target.resources_build_phase.files_references.include?(file_ref)

          if File.exist?('Pods/Pods.xcodeproj')
            pods_project = Xcodeproj::Project.open('Pods/Pods.xcodeproj')
            pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0' if config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'].to_f < 15.0
              end
            end
            pods_project.save
          end

          project.save
          RUBY

      # ========================================
      # 7️⃣ BUILD & EXPORT
      # ========================================
      - name: 🔨 Build & Export
        run: |
          cd app/ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PROFILE_UUID }}" \
            PROVISIONING_PROFILE="${{ env.PROFILE_UUID }}" \
            CODE_SIGN_ENTITLEMENTS="App/App.entitlements" \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            -quiet

          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.IOS_BUNDLE_ID }}</key>
              <string>${{ env.PROFILE_UUID }}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build \
            -exportOptionsPlist exportOptions.plist \
            -quiet

      # ========================================
      # 8️⃣ UPLOAD
      # ========================================
      - name: 🚀 Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: app/ios/App/build/App.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      # ========================================
      # 📝 NOUVEAUTÉS DE CETTE VERSION (App Store)
      # ========================================
      # Pousse whatsnew/<lang>/default.txt vers le champ public "Nouveautés de
      # cette version" (versionLocalizations.whatsNew) via l'App Store Connect API.
      # Bloquant : un échec ici fait échouer le job (continue-on-error retiré).
      - name: 📝 Update App Store release notes
        if: success()
        env:
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          ASC_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_VERSION: ${{ env.IOS_VERSION }}
          WHATSNEW_DIR: app/whatsnew
        run: node ci/.github/scripts/update-appstore-whatsnew.mjs

      # ========================================
      # 9️⃣ ARTIFACTS & NOTIFICATIONS
      # ========================================
      - name: ✅ Success
        if: success()
        run: exit 0

      - name: ❌ Failed
        if: failure()
        run: exit 1
